# application.properties (für Railway)
spring.application.name=All-API

# H2 für lokale Entwicklung (optional, kann auch in application-local.properties ausgelagert werden)
spring.datasource.url=jdbc:h2:file:./data/allapi;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# PostgreSQL für Railway (nutzt Umgebungsvariablen von Railway)
# Railway setzt diese automatisch, wenn du eine Postgres-DB hinzufügst
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update # Oder "none" wenn du Flyway/Liquibase nutzt

server.port=${PORT} # Railway setzt den Port über eine Umgebungsvariable
    